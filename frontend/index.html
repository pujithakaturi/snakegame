<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Synth Snake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: {
                            pink: '#ff2a6d',
                            cyan: '#05d9e8',
                            purple: '#b300ff',
                            dark: '#01012b',
                            darker: '#000014'
                        }
                    },
                    boxShadow: {
                        'neon-pink': '0 0 10px #ff2a6d, 0 0 20px #ff2a6d',
                        'neon-cyan': '0 0 10px #05d9e8, 0 0 20px #05d9e8',
                        'neon-purple': '0 0 10px #b300ff, 0 0 20px #b300ff',
                    },
                    fontFamily: {
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #000014;
            color: #fff;
            overflow: hidden; /* Prevent scrolling from arrow keys */
        }
        /* Custom scrollbar for track list */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(1, 1, 43, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: #b300ff;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff2a6d;
        }
    </style>
    </head>
<body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
